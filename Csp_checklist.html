<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSP Pre-Trade Checklist | Angelrow Trading Systems</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e8e6e1;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    padding: 24px 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }

/* Header */
.header { margin-bottom: 32px; border-bottom: 2px solid #1a1a2e; padding-bottom: 24px; }
.header-label { font-size: 11px; letter-spacing: 4px; color: #666; margin-bottom: 8px; text-transform: uppercase; }
.header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.header p { font-size: 12px; color: #666; margin-top: 8px; line-height: 1.5; }

/* Score Bar */
.score-bar {
border-radius: 8px; padding: 16px 20px; margin-bottom: 28px;
display: flex; align-items: center; justify-content: space-between;
border: 1px solid; transition: all 0.3s;
}
.score-label { font-size: 11px; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.score-status { font-size: 20px; font-weight: 700; }
.score-number { font-size: 28px; font-weight: 700; }
.score-total { font-size: 14px; color: #555; }
.score-track { width: 120px; height: 4px; background: #1a1a2e; border-radius: 2px; overflow: hidden; margin-top: 4px; }
.score-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }

/* Calculator */
.calc-toggle {
width: 100%; background: #111118; border: 1px solid #252530; border-radius: 8px;
padding: 12px 16px; color: #ccc; font-size: 13px; cursor: pointer;
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 24px; font-family: inherit;
}
.calc-toggle:hover { border-color: #333; }
.calc-arrow { font-size: 18px; transition: transform 0.2s; }
.calc-arrow.open { transform: rotate(180deg); }

.calc-panel {
background: #111118; border: 1px solid #252530; border-radius: 8px;
padding: 20px; margin-bottom: 24px; margin-top: -16px; display: none;
}
.calc-panel.open { display: block; }

.calc-section-label {
font-size: 10px; letter-spacing: 2px; color: #666;
text-transform: uppercase; margin-bottom: 10px;
}
.calc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.calc-field label {
font-size: 10px; color: #666; letter-spacing: 1px;
text-transform: uppercase; display: block; margin-bottom: 4px;
}
.calc-field input {
width: 100%; background: #0a0a0f; border: 1px solid #252530;
border-radius: 4px; padding: 8px 10px; color: #fff; font-size: 14px;
font-family: inherit;
}
.calc-field input:focus { outline: none; border-color: #444; }

.calc-validation {
padding: 10px 14px; background: #2e0a0a; border: 1px solid #e74c3c33;
border-radius: 6px; margin-bottom: 16px; font-size: 11px; color: #e74c3c;
display: none;
}
.calc-validation.show { display: block; }

.calc-output {
background: #0a0a0f; border: 1px solid #252530;
border-radius: 8px; padding: 16px 20px; display: none;
}
.calc-output.show { display: block; }

.calc-working {
font-size: 11px; color: #555; line-height: 1.7; margin-bottom: 16px;
border-bottom: 1px solid #1a1a2e; padding-bottom: 12px;
}
.calc-working .hl { color: #ccc; }

.calc-max-contracts {
text-align: center; padding: 16px 0 12px;
border-bottom: 1px solid #1a1a2e; margin-bottom: 8px;
}
.calc-max-label {
font-size: 11px; color: #888; text-transform: uppercase;
letter-spacing: 2px; margin-bottom: 4px;
}
.calc-max-number { font-size: 36px; font-weight: 700; color: #2ecc71; }
.calc-max-binding { font-size: 10px; color: #555; margin-top: 2px; }

.output-row {
padding: 8px 0; border-bottom: 1px solid #1a1a2e;
display: flex; justify-content: space-between; align-items: baseline;
}
.output-row-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
.output-row-value { font-size: 16px; font-weight: 600; text-align: right; }
.output-row-sub { font-size: 10px; color: #555; margin-top: 1px; }

/* Sections */
.section { margin-bottom: 16px; border: 1px solid #1a1a2e; border-radius: 8px; overflow: hidden; transition: border-color 0.3s; }
.section.complete { border-color: var(–section-color-44); }

.section-header {
width: 100%; background: #111118; border: none; padding: 14px 16px;
display: flex; align-items: center; justify-content: space-between;
cursor: pointer; font-family: inherit;
}
.section.complete .section-header { background: var(–section-color-11); }

.section-left { display: flex; align-items: center; gap: 10px; }
.section-icon { font-size: 18px; }
.section-title { font-size: 13px; font-weight: 600; color: #e8e6e1; letter-spacing: 0.5px; }
.section-right { display: flex; align-items: center; gap: 10px; }
.section-count { font-size: 11px; color: #555; font-weight: 600; }
.section.complete .section-count { color: var(–section-color); }
.section-chevron { font-size: 14px; color: #555; transition: transform 0.2s; }
.section-chevron.collapsed { transform: rotate(-90deg); }

.section-items { padding: 4px 0; }
.section-items.hidden { display: none; }

.item { padding: 12px 16px; border-bottom: 1px solid #111118; }
.item-row { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }

.checkbox {
width: 20px; height: 20px; min-width: 20px; border-radius: 4px;
border: 2px solid #333; background: transparent;
display: flex; align-items: center; justify-content: center;
font-size: 12px; transition: all 0.2s; margin-top: 1px;
}
.checkbox.checked { border-color: var(–section-color); background: var(–section-color-22); color: var(–section-color); }

.item-label {
font-size: 13px; font-weight: 500; color: #e8e6e1; transition: all 0.2s;
}
.item-label.checked { color: #888; text-decoration: line-through; }

.item-detail { font-size: 11px; color: #555; line-height: 1.6; margin-top: 6px; }

.item-input {
margin-top: 8px; margin-left: 32px; background: #0a0a0f;
border: 1px solid #252530; border-radius: 4px; padding: 6px 10px;
color: #fff; font-size: 12px; font-family: inherit;
width: calc(100% - 48px);
}
.item-input:focus { outline: none; border-color: #444; }

/* Footer */
.footer {
margin-top: 32px; padding: 16px 0; border-top: 1px solid #1a1a2e;
font-size: 10px; color: #444; text-align: center; letter-spacing: 1px;
}

/* Responsive */
@media (max-width: 480px) {
.calc-grid { grid-template-columns: 1fr; }
.score-bar { flex-direction: column; gap: 12px; align-items: flex-start; }
}
</style>

</head>
<body>
<div class="container" id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
const SECTIONS = [
  {
    title: "1. POSITION SIZING", icon: "\u2696\uFE0F", color: "#e74c3c",
    items: [
      { id: "max_risk", label: "Max risk per trade defined?", detail: "Use the calculator above. Two limits must pass: (1) managed risk via stop \u2264 2% of portfolio, AND (2) total notional \u2264 15% of portfolio. Both must be green before entering." },
      { id: "premium_trap", label: "Premium trap check?", detail: "If premium per contract feels 'too low' and you're tempted to increase size \u2014 STOP. Low premium = low reward per unit of risk. Sizing up doesn't fix that equation, it amplifies the downside." },
      { id: "assignment_ok", label: "Happy to own shares at strike?", detail: "If assigned, would you hold the stock at this price? For CSPs, assignment should be an acceptable outcome, not a disaster scenario." },
    ],
  },
  {
    title: "2. IV & EARNINGS SETUP", icon: "\uD83D\uDCCA", color: "#f39c12",
    items: [
      { id: "ivr", label: "IV Rank > 50?", detail: "IVR shows where current IV sits relative to its own 52-week range. Above 50 = IV is elevated = premium is rich = edge for sellers. Below 30 = avoid selling premium.", input: "IVR value" },
      { id: "ivp", label: "IV Percentile > 50?", detail: "IVP shows what % of days in the past year had lower IV than today. Above 50 = more days had lower IV = today's IV is relatively high. Confirms the IVR signal.", input: "IV Percentile" },
      { id: "earnings_date", label: "Earnings date checked?", detail: "Know the exact date. If selling IV crush: expiry must be AFTER earnings. If avoiding earnings: expiry must be BEFORE. No guessing \u2014 check the calendar.", input: "Earnings date" },
      { id: "earnings_strategy", label: "Earnings strategy clear?", detail: "IV CRUSH play: Sell premium before earnings, buy back after IV collapses post-announcement. Requires OTM strike with buffer for the expected move. AVOIDANCE: Close or don't open positions that span earnings without a thesis." },
      { id: "expected_move", label: "Expected move vs strike distance?", detail: "Check the expected move (shown on option chain). Your strike should be OUTSIDE the expected move for IV crush plays. E.g., if expected move is \u00B115%, your put strike should be >15% below current price." },
    ],
  },
  {
    title: "3. TECHNICAL ANALYSIS", icon: "\uD83D\uDCC8", color: "#2ecc71",
    items: [
      { id: "trend", label: "Trend direction confirmed?", detail: "For CSPs: price should be in an uptrend or at support, not in free-fall. Check: price above 50 & 200 SMA? Higher lows forming? Avoid selling puts into a downtrend." },
      { id: "support", label: "Key support levels identified?", detail: "Your strike should ideally be at or below a significant support level. If the stock breaks support above your strike, you're in trouble before it even reaches you.", input: "Support level ($)" },
      { id: "rsi", label: "RSI checked (not overbought/oversold)?", detail: "RSI 30\u201370 = neutral zone, fine for CSPs. RSI > 70 = overbought, stock may pull back (increases put risk). RSI < 30 = oversold, could be opportunity OR falling knife.", input: "RSI value" },
      { id: "macd", label: "MACD trend aligned?", detail: "MACD above signal line = bullish momentum (good for CSPs). MACD below and diverging = bearish momentum (caution). Look for confirmation, not primary signal." },
      { id: "volume", label: "Volume supports the move?", detail: "Rising price on rising volume = conviction. Rising price on falling volume = weak rally. Check volume SMA \u2014 is current volume above or below average?" },
    ],
  },
  {
    title: "4. TRADE STRUCTURE", icon: "\uD83D\uDD27", color: "#3498db",
    items: [
      { id: "dte", label: "Days to expiry appropriate?", detail: "Sweet spot for premium selling: 30\u201345 DTE (theta decay accelerates). Under 21 DTE = gamma risk increases. For IV crush: enough time for post-earnings theta burn but not too much.", input: "DTE" },
      { id: "delta", label: "Delta checked?", detail: "Delta \u2248 probability of expiring ITM. For CSPs: 0.15\u20130.30 delta = 70\u201385% probability of profit. Lower delta = safer but less premium. Match to your conviction level.", input: "Delta" },
      { id: "limit_order", label: "Using limit order (not market)?", detail: "Always. Set your entry price at the mid or slightly above. Market orders on options give away edge on the bid-ask spread, especially on less liquid names." },
      { id: "liquidity", label: "Option liquidity adequate?", detail: "HARD RULE: bid-ask spread must be < 20% of mid price. Also check: open interest > 100? Volume today? Wide spreads = slippage on entry AND exit. Low liquidity means you can't get out when you need to. If spread is too wide, walk away regardless of setup quality." },
    ],
  },
  {
    title: "5. EXIT PLAN", icon: "\uD83D\uDEAA", color: "#9b59b6",
    items: [
      { id: "oco", label: "OCO order set immediately?", detail: "Set your profit target (buy-to-close limit) and stop-loss (buy stop) as an OCO the moment the trade fills. Not later. Not tomorrow. Immediately." },
      { id: "profit_target", label: "Profit target defined?", detail: "Typical: close at 50\u201365% of max profit. For IV crush: more aggressive target (e.g., close when premium drops 40\u201360% post-earnings). Don't get greedy chasing the last 20%.", input: "Target price ($)" },
      { id: "stop_loss", label: "Stop-loss defined?", detail: "Typical: 2\u00D7 the premium received. E.g., sold for $0.50, stop at $1.00\u2013$1.25. This caps your loss at a defined multiple. Adjust based on conviction and IV environment.", input: "Stop price ($)" },
      { id: "assignment_plan", label: "Assignment plan ready?", detail: "If assigned despite stop-loss (gap down): will you hold and sell covered calls? Sell immediately? Have the plan BEFORE you enter. No improvising under pressure." },
    ],
  },
];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const state = {
  checked: {},
  collapsed: {},
  calcOpen: false,
  calc: { portfolio: "50000", riskPct: "2", notionalCapPct: "15", strike: "", premium: "", stop: "" },
};

const totalItems = SECTIONS.reduce((s, sec) => s + sec.items.length, 0);

function getCheckedCount() {
  return Object.values(state.checked).filter(Boolean).length;
}

function getThreshold() {
  const c = getCheckedCount();
  if (c >= 18) return { label: "STRONG SETUP", color: "#2ecc71", bg: "#0a2e1a" };
  if (c >= 14) return { label: "ACCEPTABLE", color: "#f39c12", bg: "#2e2a0a" };
  return { label: "REVIEW NEEDED", color: "#e74c3c", bg: "#2e0a0a" };
}

function calcResults() {
  const c = state.calc;
  const pf = parseFloat(c.portfolio) || 0;
  const rp = parseFloat(c.riskPct) || 0;
  const ncp = parseFloat(c.notionalCapPct) || 0;
  const st = parseFloat(c.strike) || 0;
  const pr = parseFloat(c.premium) || 0;
  const sp = parseFloat(c.stop) || 0;

  const managedLossPerContract = sp > pr ? (sp - pr) * 100 : 0;
  const maxManagedRiskDollars = pf && rp ? pf * (rp / 100) : 0;
  const maxContractsByStop = managedLossPerContract > 0 ? Math.floor(maxManagedRiskDollars / managedLossPerContract) : 0;
  const maxNotionalDollars = pf && ncp ? pf * (ncp / 100) : 0;
  const maxContractsByNotional = st > 0 ? Math.floor(maxNotionalDollars / (st * 100)) : 0;

  const bothValid = maxContractsByStop > 0 && maxContractsByNotional > 0;
  const maxContracts = bothValid ? Math.min(maxContractsByStop, maxContractsByNotional) : (maxContractsByStop || maxContractsByNotional);
  const binding = bothValid ? (maxContractsByStop <= maxContractsByNotional ? "stop" : "notional") : (maxContractsByStop > 0 ? "stop" : "notional");

  const totalPremium = maxContracts * pr * 100;
  const totalManagedRisk = maxContracts * managedLossPerContract;
  const totalNotional = maxContracts * st * 100;
  const notionalPct = pf ? ((totalNotional / pf) * 100).toFixed(1) : "0";
  const managedRiskPct = pf ? ((totalManagedRisk / pf) * 100).toFixed(1) : "0";
  const returnOnManagedRisk = totalManagedRisk > 0 ? ((totalPremium / totalManagedRisk) * 100).toFixed(1) : "0";

  const hasAll = pf && rp && ncp && st && pr && sp && sp > pr;
  const stopError = sp > 0 && pr > 0 && sp <= pr;

  return {
    pf, rp, ncp, st, pr, sp,
    managedLossPerContract, maxManagedRiskDollars, maxContractsByStop,
    maxNotionalDollars, maxContractsByNotional,
    maxContracts, binding,
    totalPremium, totalManagedRisk, totalNotional,
    notionalPct, managedRiskPct, returnOnManagedRisk,
    hasAll, stopError
  };
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  const t = getThreshold();
  const cc = getCheckedCount();
  const r = calcResults();

  let html = '';

  // Header
  html += `
    <div class="header">
      <div class="header-label">Angelrow Trading Systems</div>
      <h1>CSP Pre-Trade Checklist</h1>
      <p>Complete before every entry. No exceptions. No shortcuts.</p>
    </div>`;

  // Score Bar
  html += `
    <div class="score-bar" style="background:${t.bg};border-color:${t.color}33">
      <div>
        <div class="score-label">Trade Readiness</div>
        <div class="score-status" style="color:${t.color}">${t.label}</div>
      </div>
      <div style="text-align:right">
        <div class="score-number" style="color:${t.color}">${cc}<span class="score-total">/${totalItems}</span></div>
        <div class="score-track">
          <div class="score-fill" style="width:${(cc/totalItems)*100}%;background:${t.color}"></div>
        </div>
      </div>
    </div>`;

  // Calculator Toggle
  html += `
    <button class="calc-toggle" onclick="toggleCalc()">
      <span>\u2696\uFE0F Position Size Calculator</span>
      <span class="calc-arrow ${state.calcOpen ? 'open' : ''}">\u25BE</span>
    </button>`;

  // Calculator Panel
  html += `<div class="calc-panel ${state.calcOpen ? 'open' : ''}">`;

  // Risk Parameters
  html += `
    <div class="calc-section-label">Risk Parameters</div>
    <div class="calc-grid">
      ${calcField("portfolio", "Portfolio ($)", "50000")}
      ${calcField("riskPct", "Max Risk % (stop)", "2")}
      ${calcField("notionalCapPct", "Notional Cap %", "15")}
    </div>`;

  // Trade Parameters
  html += `
    <div class="calc-section-label">Trade Parameters</div>
    <div class="calc-grid">
      ${calcField("strike", "Strike ($)", "15")}
      ${calcField("premium", "Premium ($)", "0.35")}
      ${calcField("stop", "Stop Price ($)", "0.80")}
    </div>`;

  // Validation
  html += `<div class="calc-validation ${r.stopError ? 'show' : ''}">
    Stop must be higher than premium. You sold at $${r.pr.toFixed(2)}, so your buy-to-close stop must be above this \u2014 e.g. $${(r.pr * 2).toFixed(2)}.
  </div>`;

  // Output
  html += `<div class="calc-output ${r.hasAll ? 'show' : ''}">`;

  html += `<div class="calc-section-label">How it's calculated</div>`;
  html += `<div class="calc-working">
    Loss per contract if stopped = ($${r.sp.toFixed(2)} \u2212 $${r.pr.toFixed(2)}) \u00D7 100 = <span class="hl">$${r.managedLossPerContract.toFixed(0)}</span><br>
    Layer 1 \u2014 Stop risk: $${r.maxManagedRiskDollars.toLocaleString()} \u00F7 $${r.managedLossPerContract.toFixed(0)} = <span class="hl">${r.maxContractsByStop} contracts</span><br>
    Layer 2 \u2014 Notional: $${r.maxNotionalDollars.toLocaleString()} \u00F7 $${(r.st * 100).toLocaleString()} = <span class="hl">${r.maxContractsByNotional} contracts</span>
  </div>`;

  html += `<div class="calc-section-label">Result</div>`;
  html += `<div class="calc-max-contracts">
    <div class="calc-max-label">Max Contracts</div>
    <div class="calc-max-number">${r.maxContracts}</div>
    <div class="calc-max-binding">Limited by ${r.binding === "stop" ? `managed risk (${r.rp}% stop rule)` : `notional cap (${r.ncp}%)`}</div>
  </div>`;

  const mrColor = parseFloat(r.managedRiskPct) <= r.rp ? "#2ecc71" : "#e74c3c";
  const nColor = parseFloat(r.notionalPct) <= r.ncp ? "#2ecc71" : "#e74c3c";

  html += outputRow("Managed Risk (if stopped)", `$${r.totalManagedRisk.toLocaleString()}`, `${r.managedRiskPct}% of portfolio`, mrColor);
  html += outputRow("Notional Exposure", `$${r.totalNotional.toLocaleString()}`, `${r.notionalPct}% of portfolio`, nColor);
  html += outputRow("Total Premium Collected", `$${r.totalPremium.toLocaleString()}`, "", "#fff");
  html += outputRow("Return on Managed Risk", `${r.returnOnManagedRisk}%`, "Premium \u00F7 risk if stopped", "#fff");

  html += `</div>`; // calc-output
  html += `</div>`; // calc-panel

  // Sections
  SECTIONS.forEach((sec, sIdx) => {
    const sChecked = sec.items.filter(item => state.checked[item.id]).length;
    const isComplete = sChecked === sec.items.length;
    const isCollapsed = state.collapsed[sIdx];

    html += `<div class="section ${isComplete ? 'complete' : ''}" style="--section-color:${sec.color};--section-color-44:${sec.color}44;--section-color-11:${sec.color}11;--section-color-22:${sec.color}22">`;

    html += `<button class="section-header" onclick="toggleSection(${sIdx})">
      <div class="section-left">
        <span class="section-icon">${sec.icon}</span>
        <span class="section-title">${sec.title}</span>
      </div>
      <div class="section-right">
        <span class="section-count">${sChecked}/${sec.items.length}</span>
        <span class="section-chevron ${isCollapsed ? 'collapsed' : ''}">\u25BE</span>
      </div>
    </button>`;

    html += `<div class="section-items ${isCollapsed ? 'hidden' : ''}">`;

    sec.items.forEach(item => {
      const checked = state.checked[item.id];
      html += `<div class="item">
        <div class="item-row" onclick="toggleCheck('${item.id}')">
          <div class="checkbox ${checked ? 'checked' : ''}" style="--section-color:${sec.color};--section-color-22:${sec.color}22">
            ${checked ? '\u2713' : ''}
          </div>
          <div>
            <div class="item-label ${checked ? 'checked' : ''}">${item.label}</div>
            <div class="item-detail">${escapeHtml(item.detail)}</div>
          </div>
        </div>`;

      if (item.input) {
        html += `<input class="item-input" type="text" placeholder="${item.input}" id="note_${item.id}" oninput="/* notes stored in DOM */">`;
      }

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  // Footer
  html += `<div class="footer">RULE: IF CHECKLIST SCORE &lt; 14/20 \u2192 NO TRADE &nbsp;|&nbsp; BOTH RISK LAYERS MUST PASS</div>`;

  document.getElementById('app').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function calcField(key, label, placeholder) {
  return `<div class="calc-field">
    <label>${label}</label>
    <input type="number" step="any" value="${state.calc[key]}" placeholder="${placeholder}"
           oninput="updateCalc('${key}', this.value)">
  </div>`;
}

function outputRow(label, value, sub, color) {
  return `<div class="output-row">
    <span class="output-row-label">${label}</span>
    <div>
      <div class="output-row-value" style="color:${color}">${value}</div>
      ${sub ? `<div class="output-row-sub">${sub}</div>` : ''}
    </div>
  </div>`;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ═══════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════
function toggleCalc() {
  state.calcOpen = !state.calcOpen;
  render();
}

function updateCalc(key, value) {
  state.calc[key] = value;
  updateCalcOutput();
}

function updateCalcOutput() {
  const r = calcResults();

  // Update validation
  const valEl = document.querySelector('.calc-validation');
  if (valEl) {
    valEl.classList.toggle('show', r.stopError);
    if (r.stopError) {
      valEl.textContent = `Stop must be higher than premium. You sold at $${r.pr.toFixed(2)}, so your buy-to-close stop must be above this \u2014 e.g. $${(r.pr * 2).toFixed(2)}.`;
    }
  }

  // Update output panel
  const outEl = document.querySelector('.calc-output');
  if (outEl) {
    outEl.classList.toggle('show', r.hasAll);
    if (r.hasAll) {
      const mrColor = parseFloat(r.managedRiskPct) <= r.rp ? "#2ecc71" : "#e74c3c";
      const nColor = parseFloat(r.notionalPct) <= r.ncp ? "#2ecc71" : "#e74c3c";

      outEl.innerHTML = `
        <div class="calc-section-label">How it's calculated</div>
        <div class="calc-working">
          Loss per contract if stopped = ($${r.sp.toFixed(2)} \u2212 $${r.pr.toFixed(2)}) \u00D7 100 = <span class="hl">$${r.managedLossPerContract.toFixed(0)}</span><br>
          Layer 1 \u2014 Stop risk: $${r.maxManagedRiskDollars.toLocaleString()} \u00F7 $${r.managedLossPerContract.toFixed(0)} = <span class="hl">${r.maxContractsByStop} contracts</span><br>
          Layer 2 \u2014 Notional: $${r.maxNotionalDollars.toLocaleString()} \u00F7 $${(r.st * 100).toLocaleString()} = <span class="hl">${r.maxContractsByNotional} contracts</span>
        </div>
        <div class="calc-section-label">Result</div>
        <div class="calc-max-contracts">
          <div class="calc-max-label">Max Contracts</div>
          <div class="calc-max-number">${r.maxContracts}</div>
          <div class="calc-max-binding">Limited by ${r.binding === "stop" ? `managed risk (${r.rp}% stop rule)` : `notional cap (${r.ncp}%)`}</div>
        </div>
        ${outputRow("Managed Risk (if stopped)", `$${r.totalManagedRisk.toLocaleString()}`, `${r.managedRiskPct}% of portfolio`, mrColor)}
        ${outputRow("Notional Exposure", `$${r.totalNotional.toLocaleString()}`, `${r.notionalPct}% of portfolio`, nColor)}
        ${outputRow("Total Premium Collected", `$${r.totalPremium.toLocaleString()}`, "", "#fff")}
        ${outputRow("Return on Managed Risk", `${r.returnOnManagedRisk}%`, "Premium \u00F7 risk if stopped", "#fff")}
      `;
    }
  }
}

function toggleCheck(id) {
  state.checked[id] = !state.checked[id];
  render();
}

function toggleSection(idx) {
  state.collapsed[idx] = !state.collapsed[idx];
  render();
}

// Initial render
render();
</script>

</body>
</html>
