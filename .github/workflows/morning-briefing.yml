name: Morning Trading Briefing

# ─── Schedule ──────────────────────────────────────────────────────────────
# Two cron entries handle UK daylight saving time automatically:
#   30 6 * * 1-5  →  06:30 UTC  =  06:30 GMT  (winter, late Oct – late Mar)
#   30 5 * * 1-5  →  05:30 UTC  =  06:30 BST  (summer, late Mar – late Oct)
#
# During DST transition weeks both crons fire, but main.py has a ±40-minute
# time gate centred on 06:30 UK time — only the correct run will proceed.
on:
  schedule:
    - cron: '30 6 * * 1-5'   # 06:30 GMT  (winter)
    - cron: '30 5 * * 1-5'   # 06:30 BST  (summer)
  workflow_dispatch:          # Manual trigger — bypasses time gate

# ─── Permissions ───────────────────────────────────────────────────────────
permissions:
  contents: read

jobs:
  send-briefing:
    name: Send Morning Briefing
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'briefing/requirements.txt'

      # ── 3. Dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r briefing/requirements.txt

      # ── 4. Run briefing ────────────────────────────────────────────────
      - name: Run morning briefing
        env:
          SENDER_EMAIL:     ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD:  ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL:  ${{ secrets.RECIPIENT_EMAIL }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python briefing/main.py
