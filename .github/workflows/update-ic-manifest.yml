name: IC Backtester — Update Data Manifest

on:
  push:
    paths:
      - 'ic-backtester/Data/*.csv'
      - 'ic-backtester/Data/*.CSV'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find CSV files and write manifest
        run: |
          # Case-insensitive search for SPX and VIX files
          SPX_FILES=$(find ic-backtester/Data -maxdepth 1 -iname "spx*.csv" | sort | xargs -I{} basename {})
          VIX_FILES=$(find ic-backtester/Data -maxdepth 1 -iname "vix*.csv" | sort | xargs -I{} basename {})

          echo "SPX files found:"
          echo "$SPX_FILES"
          echo "VIX files found:"
          echo "$VIX_FILES"

          build_json_array() {
            local arr="["
            local first=true
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              if [ "$first" = true ]; then arr="${arr}\"${f}\""; first=false;
              else arr="${arr},\"${f}\""; fi
            done <<< "$1"
            echo "${arr}]"
          }

          SPX_JSON=$(build_json_array "$SPX_FILES")
          VIX_JSON=$(build_json_array "$VIX_FILES")

          cat > ic-backtester/Data/manifest.json << EOF
          {
            "spx": ${SPX_JSON},
            "vix": ${VIX_JSON},
            "updatedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

          echo "Manifest written:"
          cat ic-backtester/Data/manifest.json

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ic-backtester/Data/manifest.json
          if git diff --cached --quiet; then
            echo "Manifest unchanged — skipping commit"
          else
            git commit -m "chore: update IC backtester data manifest [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
