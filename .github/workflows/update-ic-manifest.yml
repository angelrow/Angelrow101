name: IC Backtester — Update Data Manifest

on:
  push:
    paths:
      - 'ic-backtester/data/*.csv'
      - 'ic-backtester/data/*.CSV'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find CSV files and write manifest
        run: |
          # Find all SPX 1-min files (case-insensitive match via find)
          SPX_FILES=$(find ic-backtester/data -maxdepth 1 -iname "spx*.csv" | sort | xargs -I{} basename {})
          VIX_FILE=$(find ic-backtester/data -maxdepth 1 -iname "vix*.csv" | sort | tail -1 | xargs -I{} basename {})

          if [ -z "$SPX_FILES" ]; then
            echo "No SPX CSV files found in ic-backtester/data/"
            find ic-backtester/data -maxdepth 1
          fi

          echo "SPX files found:"
          echo "$SPX_FILES"
          echo "VIX file: $VIX_FILE"

          # Build JSON array of SPX file names
          SPX_JSON="["
          FIRST=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ "$FIRST" = true ]; then
              SPX_JSON="${SPX_JSON}\"${f}\""
              FIRST=false
            else
              SPX_JSON="${SPX_JSON},\"${f}\""
            fi
          done <<< "$SPX_FILES"
          SPX_JSON="${SPX_JSON}]"

          # VIX entry (null if not found)
          if [ -n "$VIX_FILE" ]; then
            VIX_JSON="\"${VIX_FILE}\""
          else
            VIX_JSON="null"
          fi

          cat > ic-backtester/data/manifest.json << EOF
          {
            "spx": ${SPX_JSON},
            "vix": ${VIX_JSON},
            "updatedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

          echo "Manifest written:"
          cat ic-backtester/data/manifest.json

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ic-backtester/data/manifest.json
          if git diff --cached --quiet; then
            echo "Manifest unchanged — skipping commit"
          else
            git commit -m "chore: update IC backtester data manifest [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
