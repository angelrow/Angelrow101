name: Market Weather Grid — Data Fetcher

on:
  schedule:
    # Every 15 minutes, Mon–Fri, 13:00–20:59 UTC (covers 09:00–16:59 ET)
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r data-fetcher/requirements.txt

      - name: Fetch market data
        run: python data-fetcher/fetch_market_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/grid-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update market weather grid data [skip ci]"
            git pull --rebase origin main
            git push
          fi
